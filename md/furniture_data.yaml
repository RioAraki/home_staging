# Verplant & Zugestellt — furniture card mechanical data
# ======================================================
#
# This file digitises the shape on every furniture card in machine-readable
# form. It is the structured companion to FURNITURE.md and the per-card images
# under images/cards/furniture/.
#
# Coordinate system
# -----------------
# Each option's shape lives in its own minimal bounding box. Cells are written
# as [row, col], 0-indexed, with (0, 0) at the top-left of the bounding box as
# the card draws it. `bbox: [H, W]` is the bounding box size.
#
# Per option fields
# -----------------
#   option_index   : 1..3, the option's position on the card (top → bottom).
#   name_zh        : the Chinese name printed on the card.
#   name_en        : best-effort English handle (cross-referenced with scenarios).
#   bbox           : [rows, cols] of the bounding box.
#   shape          : cells the furniture itself occupies (count for scoring).
#   open_spaces    : cells that must remain walkable at end of game.
#   wall_edges     : list of bbox edges that must abut a wall (top/right/bottom/left).
#                    Empty list = no wall requirement.
#   printed_markers: number of furniture markers printed on the card face.
#                    (Default 0; non-zero means more than one piece must be installed.)
#   notes          : free-text caveats / verification flags.
#
# Verification status
# -------------------
# Shapes were transcribed by visual inspection of the workshop assets in
# `images/cards/furniture/`. Where a shape is ambiguous in the photo, the
# option carries `verify: true` and a note. Sanity-check before relying on the
# data for engine logic.

